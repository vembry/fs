version: "2"
sql:
  - engine: "sqlite"
    schema: "sqlc/schema.sql"
    queries: "sqlc/queries.sql"
    gen:
      go:
        package: "db"
        out: "pkg/db"
        emit_interface: true
        emit_json_tags: true
        json_tags_case_style: "snake"
        overrides:
          - column: "paths.information"
            go_type: "encoding/json.RawMessage"
